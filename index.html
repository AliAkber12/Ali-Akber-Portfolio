<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ali Akber — AI-Powered Web & App Developer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<style>
/* ===================== CSS VARIABLES & RESET ===================== */
:root{
  --bg:#0a0a0f;--surface:#111118;--card:#18181b;
  --accent:#7c3aed;--accent2:#a855f7;--accent3:#06b6d4;
  --text:#e4e4e7;--muted:#71717a;--border:rgba(255,255,255,0.07);
  --glow:rgba(124,58,237,0.35);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;overflow-x:hidden;line-height:1.6;}

/* ===================== PRELOADER ===================== */
#preloader{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.5rem;transition:opacity 0.7s cubic-bezier(0.4,0,0.2,1),visibility 0.7s;}
#preloader.done{opacity:0;visibility:hidden;pointer-events:none;}
.pre-logo{font-size:2.2rem;font-weight:900;background:linear-gradient(135deg,#a855f7,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.03em;opacity:0;transform:translateY(20px);animation:preLogoIn 0.5s 0.2s ease forwards;}
@keyframes preLogoIn{to{opacity:1;transform:translateY(0);}}
.pre-tagline{font-size:0.75rem;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;opacity:0;animation:preLogoIn 0.5s 0.5s ease forwards;}
.pre-bar-wrap{width:180px;height:2px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;}
.pre-bar{height:100%;width:0%;background:linear-gradient(90deg,#7c3aed,#a855f7,#06b6d4);border-radius:2px;}

/* ===================== CURSOR ===================== */
#cursor-dot{width:7px;height:7px;background:#a855f7;border-radius:50%;position:fixed;pointer-events:none;z-index:9998;top:0;left:0;transform:translate(-50%,-50%);box-shadow:0 0 10px rgba(168,85,247,0.8);}
#cursor-ring{width:34px;height:34px;border:1.5px solid rgba(168,85,247,0.45);border-radius:50%;position:fixed;pointer-events:none;z-index:9997;top:0;left:0;transform:translate(-50%,-50%);transition:width 0.25s ease,height 0.25s ease,border-color 0.25s ease;}
.cursor-grow #cursor-ring{width:52px;height:52px;border-color:rgba(168,85,247,0.75);}
.cursor-grow #cursor-dot{transform:translate(-50%,-50%) scale(1.5);}
@media(pointer:coarse){#cursor-dot,#cursor-ring{display:none;}}

/* ===================== NAV ===================== */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:1rem 5%;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(10,10,15,0.85);border-bottom:1px solid var(--border);transition:all 0.3s;}
.nav-logo{font-size:1.3rem;font-weight:800;background:linear-gradient(135deg,#a855f7,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.02em;}
.nav-links{display:flex;gap:2rem;list-style:none;}
.nav-links a{color:var(--muted);text-decoration:none;font-size:0.88rem;font-weight:500;transition:color 0.2s;position:relative;}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:1px;background:var(--accent2);transform:scaleX(0);transition:transform 0.2s;}
.nav-links a:hover{color:#fff;}
.nav-links a:hover::after{transform:scaleX(1);}
.nav-cta{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;padding:0.55rem 1.3rem;border-radius:50px;font-size:0.85rem;font-weight:700;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;}
.nav-cta:hover{transform:scale(1.06);box-shadow:0 0 20px var(--glow);}

/* ===================== HERO ===================== */
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden;padding:80px 5% 4rem;}
#hero-canvas{position:absolute;inset:0;width:100%;height:100%;z-index:0;}
.hero-overlay{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,rgba(124,58,237,0.12) 0%,transparent 65%),radial-gradient(ellipse at 80% 80%,rgba(6,182,212,0.08) 0%,transparent 50%);z-index:1;}
.hero-glow-orb{position:absolute;border-radius:50%;pointer-events:none;filter:blur(80px);z-index:1;}
.orb1{width:400px;height:400px;background:radial-gradient(circle,rgba(124,58,237,0.18),transparent 70%);top:10%;left:15%;}
.orb2{width:300px;height:300px;background:radial-gradient(circle,rgba(6,182,212,0.14),transparent 70%);bottom:15%;right:10%;}
.hero-content{position:relative;z-index:2;max-width:820px;}
.hero-badge{display:inline-flex;align-items:center;gap:0.5rem;background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.3);border-radius:50px;padding:0.35rem 1rem;font-size:0.75rem;font-weight:600;color:#a855f7;margin-bottom:1.8rem;letter-spacing:0.04em;}
.hero-badge::before{content:'';width:7px;height:7px;border-radius:50%;background:#a855f7;animation:dotPulse 2s infinite;}
@keyframes dotPulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(0.8);}}
h1.hero-title{font-size:clamp(2.8rem,6vw,5rem);font-weight:900;line-height:1.05;letter-spacing:-0.03em;margin-bottom:1.2rem;}
.gradient-text{background:linear-gradient(135deg,#a855f7 0%,#06b6d4 50%,#a855f7 100%);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gradShift 5s linear infinite;}
@keyframes gradShift{0%{background-position:0%}100%{background-position:200%}}
.hero-sub{font-size:1.1rem;color:var(--muted);max-width:560px;margin:0 auto 2.5rem;line-height:1.75;}
.hero-btns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;padding:0.85rem 2rem;border-radius:50px;font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden;}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 15px 40px var(--glow);}
.btn-ghost{background:transparent;color:var(--text);border:1px solid rgba(255,255,255,0.15);padding:0.85rem 2rem;border-radius:50px;font-size:0.95rem;font-weight:600;cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden;}
.btn-ghost:hover{border-color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.05);transform:translateY(-3px);}
.hero-stats{display:flex;gap:3.5rem;justify-content:center;margin-top:4rem;flex-wrap:wrap;}
.stat-num{font-size:2.2rem;font-weight:900;background:linear-gradient(135deg,#a855f7,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.stat-label{font-size:0.72rem;color:var(--muted);margin-top:0.2rem;letter-spacing:0.05em;text-transform:uppercase;}
.ring-decoration{position:absolute;pointer-events:none;}
.ring{border:1px solid rgba(124,58,237,0.15);border-radius:50%;position:absolute;animation:ringPulse 4s ease-in-out infinite;}
.ring:nth-child(1){width:300px;height:300px;animation-delay:0s;}
.ring:nth-child(2){width:500px;height:500px;animation-delay:0.5s;}
.ring:nth-child(3){width:700px;height:700px;animation-delay:1s;}
@keyframes ringPulse{0%,100%{opacity:0.3;transform:scale(1);}50%{opacity:0.1;transform:scale(1.02);}}

/* ===================== SECTIONS ===================== */
section{padding:7rem 5%;}
.section-tag{font-size:0.7rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent3);margin-bottom:0.8rem;}
.section-title{font-size:clamp(1.8rem,3.5vw,2.8rem);font-weight:800;letter-spacing:-0.02em;margin-bottom:1rem;line-height:1.15;}
.section-sub{color:var(--muted);max-width:500px;line-height:1.75;margin-bottom:3.5rem;font-size:0.95rem;}
.tilt-card{transform-style:preserve-3d;transition:transform 0.4s cubic-bezier(0.03,0.98,0.52,0.99),box-shadow 0.4s;will-change:transform;}
.reveal{opacity:0;transform:translateY(40px);transition:opacity 0.7s ease,transform 0.7s ease;}
.reveal.visible{opacity:1;transform:translateY(0);}
.reveal-delay-1{transition-delay:0.1s;}.reveal-delay-2{transition-delay:0.2s;}.reveal-delay-3{transition-delay:0.3s;}.reveal-delay-4{transition-delay:0.4s;}.reveal-delay-5{transition-delay:0.5s;}

/* ===================== SERVICES ===================== */
#services{background:var(--surface);}
.services-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem;}
.service-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;cursor:default;position:relative;}
.service-card::before{content:'';position:absolute;inset:0;border-radius:20px;background:linear-gradient(135deg,rgba(124,58,237,0.06),transparent);opacity:0;transition:opacity 0.4s;pointer-events:none;}
.service-card:hover::before{opacity:1;}
.service-card:hover{border-color:rgba(124,58,237,0.35);}
.service-img{width:100%;height:150px;object-fit:cover;display:block;filter:saturate(0.75) brightness(0.8);transition:filter 0.4s,transform 0.5s;}
.service-card:hover .service-img{filter:saturate(1) brightness(0.9);transform:scale(1.04);}
.service-body{padding:1.5rem 1.6rem;}
.service-icon{font-size:1.5rem;margin-bottom:0.7rem;}
.service-card h3{font-size:1.05rem;font-weight:700;margin-bottom:0.5rem;}
.service-card p{font-size:0.85rem;color:var(--muted);line-height:1.65;}
.service-price{display:inline-block;background:rgba(124,58,237,0.12);color:var(--accent2);font-size:0.72rem;font-weight:700;padding:0.2rem 0.7rem;border-radius:50px;margin-top:1rem;border:1px solid rgba(124,58,237,0.2);}

/* ===================== PORTFOLIO ===================== */
#portfolio{background:var(--bg);}
.portfolio-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem;}
.portfolio-card{border-radius:20px;overflow:hidden;position:relative;background:var(--card);border:1px solid var(--border);cursor:pointer;}
.portfolio-img-wrap{height:220px;overflow:hidden;position:relative;}
.portfolio-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94),filter 0.4s;filter:saturate(0.7) brightness(0.85);}
.portfolio-card:hover .portfolio-img-wrap img{transform:scale(1.08);filter:saturate(1) brightness(0.95);}
.portfolio-img-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,10,15,0.85) 0%,transparent 60%);}
.portfolio-info{padding:1.4rem 1.6rem;}
.portfolio-type{font-size:0.68rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent3);margin-bottom:0.4rem;}
.portfolio-title{font-size:1rem;font-weight:700;margin-bottom:0.5rem;}
.portfolio-desc{font-size:0.82rem;color:var(--muted);line-height:1.6;}
.portfolio-tags{display:flex;flex-wrap:wrap;gap:0.4rem;margin-top:1rem;}
.tag{font-size:0.68rem;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:50px;padding:0.2rem 0.6rem;color:var(--muted);}
.portfolio-arrow{position:absolute;top:1.2rem;right:1.2rem;width:36px;height:36px;background:rgba(124,58,237,0.7);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.85rem;opacity:0;transform:translateY(-5px);transition:opacity 0.3s,transform 0.3s;}
.portfolio-card:hover .portfolio-arrow{opacity:1;transform:translateY(0);}

/* ===================== TEMPLATES ===================== */
#templates{background:var(--surface);}
.templates-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:2rem;}
.template-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;transition:border-color 0.3s;position:relative;}
.template-card:hover{border-color:rgba(124,58,237,0.5);}
.template-preview{height:230px;position:relative;overflow:hidden;}
.tp-browser{width:100%;height:100%;display:flex;flex-direction:column;}
.tp-bar{height:26px;display:flex;align-items:center;padding:0 10px;gap:5px;flex-shrink:0;}
.tp-dot{width:8px;height:8px;border-radius:50%;}
.tp-url{flex:1;height:13px;margin:0 8px;border-radius:3px;}
.tp-body{flex:1;overflow:hidden;}
.tmpl-modern .tp-bar{background:#10101e;}.tmpl-modern .tp-url{background:rgba(255,255,255,0.06);}.tmpl-modern .tp-body{background:linear-gradient(135deg,#080812,#10101e);}
.tmpl-modern-nav{height:28px;background:rgba(255,255,255,0.03);display:flex;align-items:center;padding:0 12px;gap:8px;}
.tmpl-modern-logo{height:7px;width:55px;background:linear-gradient(90deg,#a855f7,#06b6d4);border-radius:2px;}
.tmpl-modern-links{display:flex;gap:6px;margin-left:auto;}
.tmpl-modern-link{height:5px;width:20px;background:rgba(255,255,255,0.15);border-radius:2px;}
.tmpl-modern-hero{height:80px;background:linear-gradient(135deg,rgba(124,58,237,0.25),rgba(6,182,212,0.15));display:flex;align-items:center;padding:10px 12px;}
.tmpl-modern-title{font-size:10px;font-weight:800;color:#fff;}
.tmpl-modern-sub{font-size:6.5px;color:#888;margin-top:2px;}
.tmpl-modern-btn{background:linear-gradient(135deg,#7c3aed,#06b6d4);color:#fff;font-size:5.5px;padding:3px 7px;border-radius:50px;margin-top:5px;font-weight:700;display:inline-block;}
.tmpl-modern-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;padding:7px 12px;}
.tmpl-modern-card{height:32px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:5px;}
.tmpl-minimal .tp-bar{background:#fafafa;}.tmpl-minimal .tp-dot{background:#d1d5db;}.tmpl-minimal .tp-url{background:#f3f4f6;}.tmpl-minimal .tp-body{background:#fafafa;}
.tmpl-minimal-nav{height:32px;background:#fff;border-bottom:1px solid #e5e5e5;display:flex;align-items:center;padding:0 12px;}
.tmpl-minimal-logo{font-size:7.5px;font-weight:600;color:#111;letter-spacing:2px;}
.tmpl-minimal-links{display:flex;gap:7px;margin-left:auto;}
.tmpl-minimal-link{height:5px;width:18px;background:#ccc;border-radius:1px;}
.tmpl-minimal-hero{padding:12px 12px;}
.tmpl-minimal-h1{font-size:17px;font-weight:300;color:#111;line-height:1.05;font-family:Georgia,serif;font-style:italic;}
.tmpl-minimal-sub{height:4px;background:#ccc;border-radius:1px;margin-top:5px;width:65%;}
.tmpl-minimal-sub2{height:4px;background:#e5e5e5;border-radius:1px;margin-top:3px;width:45%;}
.tmpl-minimal-list{border-top:1px solid #e5e5e5;margin-top:8px;}
.tmpl-minimal-row{height:18px;border-bottom:1px solid #e5e5e5;display:flex;align-items:center;padding:0 12px;gap:8px;}
.tmpl-minimal-rowtext{height:4px;flex:1;background:#f0f0f0;border-radius:1px;}
.tmpl-minimal-arr{font-size:7px;color:#888;}
.tmpl-creative .tp-bar{background:#f5f0e8;}.tmpl-creative .tp-dot{background:#ff6b35;}.tmpl-creative .tp-url{background:#ebe5d8;}.tmpl-creative .tp-body{background:#f5f0e8;overflow:hidden;}
.tmpl-creative-nav{height:28px;background:#f5f0e8;border-bottom:2px solid #1a1a1a;display:flex;align-items:center;padding:0 10px;}
.tmpl-creative-logo{font-size:9px;font-weight:900;color:#1a1a1a;}
.tmpl-creative-hero{padding:10px 12px;position:relative;overflow:hidden;}
.tmpl-creative-blob{position:absolute;width:70px;height:70px;background:rgba(255,107,53,0.35);border-radius:50%;right:-15px;top:-15px;filter:blur(18px);}
.tmpl-creative-blob2{position:absolute;width:55px;height:55px;background:rgba(255,209,102,0.35);border-radius:50%;left:-5px;bottom:-10px;filter:blur(14px);}
.tmpl-creative-h1{font-size:19px;font-weight:900;color:#1a1a1a;line-height:0.88;letter-spacing:-1px;position:relative;}
.tmpl-creative-h1 em{color:#ff6b35;font-style:italic;}
.tmpl-creative-h1 u{text-decoration:none;-webkit-text-stroke:1px #1a1a1a;color:transparent;}
.tmpl-creative-ticker{background:#1a1a1a;height:15px;display:flex;align-items:center;padding:0 8px;margin-top:8px;}
.tmpl-creative-ticker-text{font-size:5px;font-weight:800;color:#ffd166;letter-spacing:0.1em;white-space:nowrap;}
.tmpl-corporate .tp-bar{background:#1a2855;}.tmpl-corporate .tp-dot{background:#2563eb;}.tmpl-corporate .tp-url{background:#1e3a8a;}.tmpl-corporate .tp-body{background:#fff;}
.tmpl-corporate-topbar{height:13px;background:#1a2855;display:flex;align-items:center;padding:0 8px;}
.tmpl-corporate-toptext{height:4px;width:110px;background:rgba(255,255,255,0.2);border-radius:1px;}
.tmpl-corporate-nav{height:26px;background:#fff;border-bottom:2px solid #1a2855;display:flex;align-items:center;padding:0 10px;gap:5px;}
.tmpl-corporate-logoicon{width:11px;height:11px;background:linear-gradient(135deg,#2563eb,#1a2855);}
.tmpl-corporate-logoname{font-size:7px;font-weight:800;color:#1a2855;}
.tmpl-corporate-cta{height:11px;width:42px;background:#2563eb;border-radius:2px;margin-left:auto;}
.tmpl-corporate-hero{background:linear-gradient(135deg,#1a2855,#1e40af);height:80px;display:flex;align-items:center;padding:8px 10px;gap:8px;}
.tmpl-corporate-htitle{font-size:8.5px;font-weight:800;color:#fff;line-height:1.3;flex:1;}
.tmpl-corporate-htitle span{color:#f59e0b;}
.tmpl-corporate-hcard{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:4px;padding:5px 7px;width:90px;flex-shrink:0;}
.tmpl-corporate-hrow{height:4px;background:rgba(255,255,255,0.2);border-radius:1px;margin-bottom:3px;}
.tmpl-corporate-hprog{height:3px;background:linear-gradient(90deg,#2563eb,#f59e0b);border-radius:2px;width:65%;}
.tmpl-corporate-servicegrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;padding:7px 10px;}
.tmpl-corporate-scard{height:28px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:3px;}
.template-info{padding:1.4rem 1.6rem;}
.template-style-tag{display:inline-flex;align-items:center;gap:0.4rem;font-size:0.68rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.6rem;}
.style-dot{width:8px;height:8px;border-radius:50%;}
.template-name{font-size:1.1rem;font-weight:800;margin-bottom:0.4rem;}
.template-desc{font-size:0.82rem;color:var(--muted);line-height:1.6;margin-bottom:1.2rem;}
.template-meta{display:flex;gap:0.4rem;flex-wrap:wrap;margin-bottom:1.2rem;}
.template-actions{display:flex;gap:0.5rem;align-items:center;}
.template-link{display:inline-flex;align-items:center;gap:0.4rem;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;text-decoration:none;padding:0.55rem 1.2rem;border-radius:50px;font-size:0.82rem;font-weight:700;transition:transform 0.2s,box-shadow 0.2s;}
.template-link:hover{transform:translateY(-2px);box-shadow:0 8px 25px var(--glow);}
.template-link-ghost{display:inline-flex;align-items:center;gap:0.4rem;background:transparent;color:var(--muted);text-decoration:none;padding:0.55rem 1rem;border-radius:50px;font-size:0.82rem;font-weight:600;border:1px solid var(--border);transition:all 0.2s;}
.template-link-ghost:hover{border-color:rgba(255,255,255,0.3);color:#fff;}

/* ===================== TECH STACK ===================== */
#tech{background:var(--bg);}
.tech-banner-wrap{border-radius:16px;overflow:hidden;margin-bottom:3rem;}
.tech-banner{width:100%;height:200px;object-fit:cover;display:block;filter:brightness(0.6) saturate(1.3) hue-rotate(200deg);}
.tech-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:1rem;}
.tech-chip{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:0.85rem 1rem;text-align:center;font-size:0.82rem;font-weight:600;transition:all 0.3s;cursor:default;position:relative;overflow:hidden;}
.tech-chip::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(124,58,237,0.1),rgba(6,182,212,0.05));opacity:0;transition:opacity 0.3s;}
.tech-chip:hover{border-color:rgba(124,58,237,0.4);transform:translateY(-3px);color:#fff;}
.tech-chip:hover::after{opacity:1;}
.tech-chip-icon{font-size:1.2rem;display:block;margin-bottom:0.3rem;}

/* ===================== PRICING ===================== */
#pricing{background:var(--surface);}
.pricing-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1.5rem;}
.price-card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:2.2rem 2rem;text-align:center;position:relative;transition:transform 0.4s cubic-bezier(0.03,0.98,0.52,0.99),box-shadow 0.4s,border-color 0.3s;}
.price-card.featured{border-color:rgba(124,58,237,0.5);background:linear-gradient(135deg,rgba(124,58,237,0.08),var(--card));}
.price-card.featured::before{content:'★ MOST POPULAR';position:absolute;top:-14px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:0.62rem;font-weight:800;letter-spacing:0.12em;padding:0.25rem 0.9rem;border-radius:50px;white-space:nowrap;}
.price-card:hover{transform:translateY(-8px);box-shadow:0 25px 60px rgba(0,0,0,0.5);}
.price-card.featured:hover{box-shadow:0 25px 60px var(--glow);}
.price-icon{font-size:2rem;margin-bottom:0.8rem;}
.price-name{font-size:0.78rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:0.75rem;}
.price-amount{font-size:3.2rem;font-weight:900;line-height:1;margin-bottom:0.25rem;background:linear-gradient(135deg,#a855f7,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.price-period{font-size:0.78rem;color:var(--muted);margin-bottom:1.5rem;}
.price-features{list-style:none;text-align:left;margin-bottom:1.5rem;}
.price-features li{display:flex;align-items:center;gap:0.5rem;font-size:0.85rem;color:var(--muted);padding:0.5rem 0;border-bottom:1px solid var(--border);}
.price-features li::before{content:'✓';color:var(--accent3);font-weight:800;flex-shrink:0;}
.price-btn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;padding:0.85rem;border-radius:50px;font-size:0.9rem;font-weight:700;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;}
.price-btn:hover{transform:scale(1.03);box-shadow:0 8px 25px var(--glow);}

/* ===================== CONTACT ===================== */
#contact{background:var(--bg);}
.contact-inner{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:start;}
.contact-img-wrap{border-radius:20px;overflow:hidden;position:relative;margin-top:2rem;}
.contact-img-wrap img{width:100%;height:380px;object-fit:cover;filter:saturate(0.7) hue-rotate(240deg) brightness(0.7);}
.contact-img-wrap::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(124,58,237,0.3),transparent);}
.contact-form{display:flex;flex-direction:column;gap:1rem;}
